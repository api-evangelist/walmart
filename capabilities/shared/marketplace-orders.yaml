naftiko: "1.0.0-alpha1"

info:
  label: "Walmart Marketplace Orders API"
  description: >-
    The Walmart Order Management APIs help sellers manage customer Sales Orders
    and stay up-to-date on order fulfillment.
  tags:
    - Walmart
    - Orders
    - Marketplace
    - Fulfillment
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      WALMART_ACCESS_TOKEN: WALMART_ACCESS_TOKEN
      WALMART_CONSUMER_CHANNEL_TYPE: WALMART_CONSUMER_CHANNEL_TYPE

capability:
  consumes:
    - type: http
      namespace: walmart-orders
      baseUri: https://marketplace.walmartapis.com
      description: "Walmart Marketplace Orders API"
      authentication:
        type: bearer
        token: "{{WALMART_ACCESS_TOKEN}}"
      resources:
        - name: orders
          path: /v3/orders
          description: Order management
          operations:
            - name: list-orders
              method: GET
              description: List all marketplace orders
              inputParameters:
                - name: WM_SEC.ACCESS_TOKEN
                  in: header
                  type: string
                  required: true
                  description: Walmart access token
                - name: WM_QOS.CORRELATION_ID
                  in: header
                  type: string
                  required: true
                  description: Correlation ID for request tracking
                - name: WM_SVC.NAME
                  in: header
                  type: string
                  required: true
                  description: Service name
                - name: createdStartDate
                  in: query
                  type: string
                  required: false
                  description: Filter orders created after this date
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: Number of orders to return
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: get-released-orders
              method: GET
              description: Get released orders ready for fulfillment
              inputParameters:
                - name: WM_SEC.ACCESS_TOKEN
                  in: header
                  type: string
                  required: true
                  description: Walmart access token
                - name: WM_QOS.CORRELATION_ID
                  in: header
                  type: string
                  required: true
                  description: Correlation ID
                - name: WM_SVC.NAME
                  in: header
                  type: string
                  required: true
                  description: Service name
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: order-by-id
          path: /v3/orders/{purchaseOrderId}
          description: Single order operations
          operations:
            - name: get-order
              method: GET
              description: Get a specific order by purchase order ID
              inputParameters:
                - name: purchaseOrderId
                  in: path
                  type: string
                  required: true
                  description: Purchase order ID
                - name: WM_SEC.ACCESS_TOKEN
                  in: header
                  type: string
                  required: true
                  description: Walmart access token
                - name: WM_QOS.CORRELATION_ID
                  in: header
                  type: string
                  required: true
                  description: Correlation ID
                - name: WM_SVC.NAME
                  in: header
                  type: string
                  required: true
                  description: Service name
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: walmart-orders-api
      resources:
        - path: /v1/orders
          name: orders
          operations:
            - method: GET
              name: list-orders
              description: List marketplace orders
              call: "walmart-orders.list-orders"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/orders/{purchaseOrderId}
          name: order
          operations:
            - method: GET
              name: get-order
              description: Get a specific order
              call: "walmart-orders.get-order"
              with:
                purchaseOrderId: "rest.purchaseOrderId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: walmart-orders-mcp
      transport: http
      tools:
        - name: list-orders
          description: List all Walmart Marketplace seller orders
          hints:
            readOnly: true
            openWorld: true
          call: "walmart-orders.list-orders"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-order
          description: Get details of a specific Walmart order by purchase order ID
          hints:
            readOnly: true
            openWorld: false
          call: "walmart-orders.get-order"
          with:
            purchaseOrderId: "tools.purchaseOrderId"
          outputParameters:
            - type: object
              mapping: "$."
