naftiko: "1.0.0-alpha1"

info:
  label: "Walmart Marketplace Inventory API"
  description: >-
    Walmart Inventory Management API for maintaining up-to-date inventory
    for items on Walmart.com, including single-item and bulk updates.
  tags:
    - Walmart
    - Inventory
    - Marketplace
    - Fulfillment
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      WALMART_ACCESS_TOKEN: WALMART_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: walmart-inventory
      baseUri: https://marketplace.walmartapis.com
      description: "Walmart Marketplace Inventory API"
      authentication:
        type: bearer
        token: "{{WALMART_ACCESS_TOKEN}}"
      resources:
        - name: inventory
          path: /v3/inventory
          description: Item inventory management
          operations:
            - name: get-inventory
              method: GET
              description: Get inventory count for a single item
              inputParameters:
                - name: sku
                  in: query
                  type: string
                  required: true
                  description: Seller SKU identifier
                - name: WM_SEC.ACCESS_TOKEN
                  in: header
                  type: string
                  required: true
                  description: Walmart access token
                - name: WM_QOS.CORRELATION_ID
                  in: header
                  type: string
                  required: true
                  description: Correlation ID
                - name: WM_SVC.NAME
                  in: header
                  type: string
                  required: true
                  description: Service name
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: update-inventory
              method: PUT
              description: Update inventory count for a single item
              inputParameters:
                - name: sku
                  in: query
                  type: string
                  required: true
                  description: Seller SKU identifier
                - name: WM_SEC.ACCESS_TOKEN
                  in: header
                  type: string
                  required: true
                  description: Walmart access token
                - name: WM_QOS.CORRELATION_ID
                  in: header
                  type: string
                  required: true
                  description: Correlation ID
                - name: WM_SVC.NAME
                  in: header
                  type: string
                  required: true
                  description: Service name
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  sku: "{{tools.sku}}"
                  quantity:
                    unit: "EACH"
                    amount: "{{tools.amount}}"

  exposes:
    - type: rest
      port: 8101
      namespace: walmart-inventory-api
      resources:
        - path: /v1/inventory
          name: inventory
          operations:
            - method: GET
              name: get-inventory
              description: Get item inventory
              call: "walmart-inventory.get-inventory"
              with:
                sku: "rest.sku"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: PUT
              name: update-inventory
              description: Update item inventory count
              call: "walmart-inventory.update-inventory"
              with:
                sku: "rest.sku"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: walmart-inventory-mcp
      transport: http
      tools:
        - name: get-inventory
          description: Get current inventory count for a Walmart item by SKU
          hints:
            readOnly: true
            openWorld: false
          call: "walmart-inventory.get-inventory"
          with:
            sku: "tools.sku"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-inventory
          description: Update inventory quantity for a Walmart item
          hints:
            readOnly: false
            destructive: false
            idempotent: true
          call: "walmart-inventory.update-inventory"
          with:
            sku: "tools.sku"
          outputParameters:
            - type: object
              mapping: "$."
