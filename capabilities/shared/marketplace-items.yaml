naftiko: "1.0.0-alpha1"

info:
  label: "Walmart Marketplace Items API"
  description: >-
    The Walmart Item Management APIs enable sellers to set up and manage
    items on Walmart.com, including catalog search and item setup.
  tags:
    - Walmart
    - Items
    - Catalog
    - Marketplace
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      WALMART_ACCESS_TOKEN: WALMART_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: walmart-items
      baseUri: https://marketplace.walmartapis.com
      description: "Walmart Marketplace Items API"
      authentication:
        type: bearer
        token: "{{WALMART_ACCESS_TOKEN}}"
      resources:
        - name: items
          path: /v3/items
          description: Item catalog management
          operations:
            - name: list-items
              method: GET
              description: Get all items in the catalog
              inputParameters:
                - name: WM_SEC.ACCESS_TOKEN
                  in: header
                  type: string
                  required: true
                  description: Walmart access token
                - name: WM_QOS.CORRELATION_ID
                  in: header
                  type: string
                  required: true
                  description: Correlation ID
                - name: WM_SVC.NAME
                  in: header
                  type: string
                  required: true
                  description: Service name
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: Number of items per page
                - name: nextCursor
                  in: query
                  type: string
                  required: false
                  description: Cursor for next page of results
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: item-search
          path: /v3/items/walmart/search
          description: Walmart catalog search
          operations:
            - name: search-catalog
              method: GET
              description: Search the Walmart catalog
              inputParameters:
                - name: query
                  in: query
                  type: string
                  required: true
                  description: Search query
                - name: WM_SEC.ACCESS_TOKEN
                  in: header
                  type: string
                  required: true
                  description: Walmart access token
                - name: WM_QOS.CORRELATION_ID
                  in: header
                  type: string
                  required: true
                  description: Correlation ID
                - name: WM_SVC.NAME
                  in: header
                  type: string
                  required: true
                  description: Service name
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8102
      namespace: walmart-items-api
      resources:
        - path: /v1/items
          name: items
          operations:
            - method: GET
              name: list-items
              description: List all catalog items
              call: "walmart-items.list-items"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/catalog/search
          name: catalog-search
          operations:
            - method: GET
              name: search-catalog
              description: Search Walmart catalog
              call: "walmart-items.search-catalog"
              with:
                query: "rest.query"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9102
      namespace: walmart-items-mcp
      transport: http
      tools:
        - name: list-items
          description: List all items in the Walmart Marketplace catalog
          hints:
            readOnly: true
            openWorld: false
          call: "walmart-items.list-items"
          outputParameters:
            - type: object
              mapping: "$."
        - name: search-catalog
          description: Search the Walmart product catalog
          hints:
            readOnly: true
            openWorld: true
          call: "walmart-items.search-catalog"
          with:
            query: "tools.query"
          outputParameters:
            - type: object
              mapping: "$."
